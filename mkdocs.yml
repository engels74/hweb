edit_uri: "website/edit/master/docs"

extra:
  social:
    - icon: fontawesome/solid/heart
      link: "https://hotio.dev/donate"
      name: Donate
    - icon: fontawesome/brands/github
      link: "https://engels74.net/github"
      name: GitHub

extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - redirects:
      redirect_maps:
        github.md: "https://github.com/engels74"
        donate.md: "https://hotio.dev/#donations"
        faq.md: "https://hotio.dev/faq"
        pia.md: https://www.privateinternetaccess.com/offer/hotio.dev_hsm018qg
        protonvpn.md: https://go.getproton.me/aff_c?offer_id=26&aff_id=7223
        protonunlimited.md: https://go.getproton.me/aff_c?offer_id=42&aff_id=7223&url_id=1194

repo_name: engels74
repo_url: https://github.com/engels74
site_author: engels74
site_description: Documentation for all Docker images maintained by engels74.
site_name: engels74.net
site_url: https://engels74.net

theme:
  icon:
    repo: fontawesome/brands/github
  favicon: img/favicon.ico
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.footer
    - content.code.copy
    - content.code.annotate
  language: en
  logo: img/hotio.svg
  name: material
  palette:
    scheme: hotio
  custom_dir: docs/overrides

markdown_extensions:
  - pymdownx.details
  - pymdownx.snippets
  - pymdownx.highlight
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - toc:
      permalink: true
  - admonition

nav:
- Home: index.md
- Containers:
  - Base Images:
    - engels74/base-image: containers/base-image.md
  - Apps:
    - engels74/caddy: containers/caddy.md
    - engels74/overseerr-anime: containers/overseerr-anime.md
    - engels74/qbittorrent: containers/qbittorrent.md
    - engels74/qflood: containers/qflood.md
    - engels74/sabnzbd: containers/sabnzbd.md
    - engels74/tgraph-bot: containers/tgraph-bot.md
